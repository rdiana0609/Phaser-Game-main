<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Puzzle Tower Climb</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
class MainMenu extends Phaser.Scene {
    constructor() {
        super('MainMenu');
    }

    create() {
        this.cameras.main.setBackgroundColor(0x9d6aa1)
        const titleText = this.add.text(this.cameras.main.centerX, 200, 'Puzzle Tower Climb', { fontSize: '40px', fill: '#ffffff' }).setOrigin(0.5);
        const playButton = this.add.text(this.cameras.main.centerX, 300, 'Press ENTER to Start', { fontSize: '24px', fill: '#ffffff' }).setOrigin(0.5);
        this.add.text(this.cameras.main.centerX, 360, 'Climb, collect all 8 puzzle pieces, avoid bombs!', { fontSize: '18px', fill: '#dddddd' }).setOrigin(0.5);

        this.sys.game.canvas.setAttribute('tabindex', '0');
        this.sys.game.canvas.focus();

        this.input.keyboard.once('keydown_ENTER', () => {
            this.scene.start('GamePlay');
        });
        playButton.setInteractive({ useHandCursor: true });
        playButton.once('pointerdown', () => {
            this.scene.start('GamePlay');
        });
    }
}

class GamePlay extends Phaser.Scene {
    constructor() {
        super('GamePlay');
    }

    init() {
        // Reset state so replaying works correctly.
        this.gameOver = false;
        this.piecesCollected = 0;
    }

    preload() {
        this.load.image('sky', 'images.png');
        this.load.image('ground', 'platform.png');
        this.load.image('piece', 'burger.png'); // re-used as the puzzle-piece icon
        this.load.image('bomb', 'bomb.png');
        this.load.spritesheet('dude', 'dude.png', { frameWidth: 32, frameHeight: 48 });
    }

    create() {
       // World is taller than the screen so there's room to climb upward.
       // The camera follows the player vertically.
       this.physics.world.setBounds(0, 0, 800, 1800);
       this.cameras.main.setBounds(0, 0, 800, 1800);

       // Tile the background sky image up the taller world.
       for (let bgY = 300; bgY > -1800; bgY -= 600) {
           this.add.image(400, bgY, 'sky').setOrigin(0.5, 0.5).setDisplaySize(800, 600);
       }

        let platforms = this.physics.add.staticGroup();
        platforms.create(400, 1768, 'ground').setScale(2).refreshBody();
        platforms.create(600, 1600, 'ground');
        platforms.create(50, 1450, 'ground');
        platforms.create(750, 1420, 'ground');

        // Staircase of platforms climbing upward toward y = 0.
        // Gaps are ~150px center-to-center, leaving clear air space well
        // above the character's 48px height even after platform thickness.
        platforms.create(550, 1380, 'ground');
        platforms.create(300, 1230, 'ground');
        platforms.create(600, 1080, 'ground');
        platforms.create(150, 930, 'ground');
        platforms.create(450, 780, 'ground');
        platforms.create(700, 630, 'ground');
        platforms.create(250, 480, 'ground');
        platforms.create(550, 330, 'ground');
        platforms.create(300, 180, 'ground');
        platforms.create(450, 30, 'ground');

        this.player = this.physics.add.sprite(100, 1650, 'dude');
        this.player.setBounce(0.2).setCollideWorldBounds(true);

        // Camera follows the player since the world is taller than the screen.
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

        if (!this.anims.get('left')) {
            this.anims.create({
                key: 'left',
                frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });
        }

        if (!this.anims.get('turn')) {
            this.anims.create({
                key: 'turn',
                frames: [{ key: 'dude', frame: 4 }],
                frameRate: 20
            });
        }

        if (!this.anims.get('right')) {
            this.anims.create({
                key: 'right',
                frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
                frameRate: 10,
                repeat: -1
            });
        }

        this.cursors = this.input.keyboard.createCursorKeys();

        // Exactly 8 puzzle pieces, scattered up the tower near platform heights.
        this.pieces = this.physics.add.group({
            key: 'piece',
            repeat: 7, // 7 + the initial one = 8 total
            setXY: { x: 400, y: 1300, stepY: -180 }
        });

        // Nudge each piece left/right a bit so they're not all in one dead-straight line.
        this.pieces.children.iterate(child => {
            child.x += Phaser.Math.Between(-250, 250);
            child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
            child.setScale(0.6); // keep piece icons reasonably sized
        });

        this.bombs = this.physics.add.group();

        // Spawn a new bomb every 5 seconds, near the player's current height
        // up the tower (so it's actually relevant to wherever they are).
        this.time.addEvent({
            delay: 5000,
            loop: true,
            callback: () => {
                if (this.gameOver) return;

                const x = Phaser.Math.Between(50, 750);
                const bomb = this.bombs.create(x, this.player.y - 250, 'bomb');
                bomb.setBounce(0.6);
                bomb.setCollideWorldBounds(true);
                // Bombs actually fall (gravity on) instead of floating, and
                // drift a little sideways as they fall.
                bomb.allowGravity = true;
                bomb.setVelocity(Phaser.Math.Between(-60, 60), 0);
            }
        });

        let scoreBg = this.add.graphics();
        scoreBg.fillStyle(0x000000, 0.5);
        scoreBg.fillRect(10, 10, 300, 70);
        scoreBg.setScrollFactor(0);

        this.scoreText = this.add.text(16, 16, 'Pieces: 0 / 8', { fontSize: '22px', fill: '#FFFFFF' });
        this.scoreText.setScrollFactor(0);
        this.hintText = this.add.text(16, 46, 'Avoid the bombs!', { fontSize: '16px', fill: '#dddddd' });
        this.hintText.setScrollFactor(0);

        this.physics.add.collider(this.player, platforms);
        this.physics.add.collider(this.pieces, platforms);
        this.physics.add.collider(this.bombs, platforms);

        this.physics.add.overlap(this.player, this.pieces, this.collectPiece, null, this);
        this.physics.add.collider(this.player, this.bombs, this.hitBomb, null, this);
    }

    update() {
        if (this.gameOver) {
            return;
        }

        if (this.cursors.left.isDown) {
            this.player.setVelocityX(-160);
            this.player.anims.play('left', true);
        } else if (this.cursors.right.isDown) {
            this.player.setVelocityX(160);
            this.player.anims.play('right', true);
        } else {
            this.player.setVelocityX(0);
            this.player.anims.play('turn');
        }

        if (this.cursors.up.isDown && this.player.body.touching.down) {
            this.player.setVelocityY(-460);
        }
    }

    collectPiece(player, piece) {
        piece.disableBody(true, true);
        this.piecesCollected += 1;
        this.scoreText.setText('Pieces: ' + this.piecesCollected + ' / 8');

        if (this.piecesCollected >= 8) {
            this.gameOver = true;
            this.physics.pause();
            this.hintText.setText('All pieces collected! Loading puzzle...');
            this.time.delayedCall(800, () => {
                this.scene.start('PuzzleScene');
            });
        }
    }

    hitBomb(player, bomb) {
        this.physics.pause();
        player.setTint(0xff0000);
        player.anims.play('turn');
        this.gameOver = true;
        this.scene.start('GameOver', { piecesCollected: this.piecesCollected });
    }
}

// ---------------------------------------------------------------
// Sliding puzzle: 3x3 grid (8 tiles + 1 empty slot).
// Drag-and-drop a tile onto the empty slot to move it there.
// A single placeholder image is sliced into 8 pieces and scrambled.
// ---------------------------------------------------------------
class PuzzleScene extends Phaser.Scene {
    constructor() {
        super('PuzzleScene');
    }

    preload() {
        // Re-use the sky background as the placeholder puzzle image so no
        // extra asset file is required.
        this.load.image('puzzleImage', 'images.png');
    }

    create() {
        this.cameras.main.setBackgroundColor(0x222233);

        this.add.text(400, 40, 'Solve the Puzzle!', { fontSize: '32px', fill: '#ffffff' }).setOrigin(0.5);
        this.add.text(400, 75, 'Drag a tile onto the empty slot', { fontSize: '16px', fill: '#cccccc' }).setOrigin(0.5);

        const gridSize = 3;
        this.tileSize = 140;
        this.gridOriginX = 400 - (gridSize * this.tileSize) / 2;
        this.gridOriginY = 110;

        // Generate 8 textures cropped from one source image, so the puzzle
        // behaves like a scrambled-image puzzle with a placeholder image.
        const sourceImg = this.textures.get('puzzleImage').getSourceImage();
        const cropW = sourceImg.width / gridSize;
        const cropH = sourceImg.height / gridSize;

        this.tileTextureKeys = [];
        let pieceIndex = 0;
        for (let row = 0; row < gridSize; row++) {
            for (let col = 0; col < gridSize; col++) {
                if (row === gridSize - 1 && col === gridSize - 1) {
                    continue; // last cell is the empty slot, no tile for it
                }
                const key = 'tile_' + pieceIndex;
                const canvasTex = this.textures.createCanvas(key, this.tileSize, this.tileSize);
                const ctx = canvasTex.getContext();
                ctx.drawImage(
                    sourceImg,
                    col * cropW, row * cropH, cropW, cropH,
                    0, 0, this.tileSize, this.tileSize
                );
                canvasTex.refresh();
                this.tileTextureKeys.push(key);
                pieceIndex++;
            }
        }

        // Build the 9 grid slots (8 filled + 1 empty).
        this.slots = [];
        for (let row = 0; row < gridSize; row++) {
            for (let col = 0; col < gridSize; col++) {
                this.slots.push({ row, col, occupied: false, tile: null });
            }
        }

        // Draw slot backgrounds so empty space is visible.
        this.slots.forEach(slot => {
            const x = this.gridOriginX + slot.col * this.tileSize + this.tileSize / 2;
            const y = this.gridOriginY + slot.row * this.tileSize + this.tileSize / 2;
            const bg = this.add.rectangle(x, y, this.tileSize - 4, this.tileSize - 4, 0x444466).setStrokeStyle(2, 0x8888aa);
            slot.bg = bg;
            slot.x = x;
            slot.y = y;
        });

        // Mark the last slot as the permanently empty one for this simple version.
        this.emptySlot = this.slots[this.slots.length - 1];

        // Shuffle texture keys and assign to all non-empty slots.
        const shuffledKeys = Phaser.Utils.Array.Shuffle(this.tileTextureKeys.slice());
        const fillableSlots = this.slots.filter(s => s !== this.emptySlot);

        this.tiles = [];
        fillableSlots.forEach((slot, i) => {
            const tileKey = shuffledKeys[i];
            const tile = this.add.image(slot.x, slot.y, tileKey).setDisplaySize(this.tileSize - 4, this.tileSize - 4);
            tile.setInteractive({ draggable: true, useHandCursor: true });
            tile.correctKey = tileKey; // which texture key this tile should end up matching
            tile.currentSlot = slot;
            slot.occupied = true;
            slot.tile = tile;
            this.tiles.push(tile);

            this.input.setDraggable(tile);
        });

        // Map each tile's texture key to the slot it belongs in when solved
        // (i.e. its original, unshuffled position in fillableSlots).
        this.solvedMapping = {};
        this.tileTextureKeys.forEach((key, i) => {
            this.solvedMapping[key] = fillableSlots[i];
        });

        this.statusText = this.add.text(400, 560, '', { fontSize: '22px', fill: '#7CFC00' }).setOrigin(0.5);

        this.input.on('dragstart', (pointer, gameObject) => {
            gameObject.setScale(1.05);
            this.children.bringToTop(gameObject);
        });

        this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
            gameObject.x = dragX;
            gameObject.y = dragY;
        });

        this.input.on('dragend', (pointer, gameObject) => {
            gameObject.setScale((this.tileSize - 4) / this.tileSize);
            this.handleDrop(gameObject);
        });
    }

    handleDrop(tile) {
        // If dropped close enough to the empty slot, swap them.
        const dist = Phaser.Math.Distance.Between(tile.x, tile.y, this.emptySlot.x, this.emptySlot.y);

        if (dist < this.tileSize / 2) {
            const oldSlot = tile.currentSlot;

            // Move tile into the empty slot.
            tile.x = this.emptySlot.x;
            tile.y = this.emptySlot.y;
            tile.currentSlot = this.emptySlot;
            this.emptySlot.occupied = true;
            this.emptySlot.tile = tile;

            // Old slot becomes the new empty slot.
            oldSlot.occupied = false;
            oldSlot.tile = null;
            this.emptySlot = oldSlot;
        } else {
            // Snap back to its current slot if not dropped on the empty one.
            tile.x = tile.currentSlot.x;
            tile.y = tile.currentSlot.y;
        }

        this.checkSolved();
    }

    checkSolved() {
        const solved = this.tiles.every(tile => tile.currentSlot === this.solvedMapping[tile.correctKey]);
        if (solved) {
            this.statusText.setText('Puzzle solved! 🎉');
            this.tiles.forEach(tile => tile.disableInteractive());
            this.time.delayedCall(1200, () => {
                this.scene.start('Victory');
            });
        } else {
            this.statusText.setText('');
        }
    }
}

class Victory extends Phaser.Scene {
    constructor() {
        super('Victory');
    }

    create() {
        this.cameras.main.setBackgroundColor(0x1a3a1a);
        this.add.text(400, 260, 'You Win!', { fontSize: '48px', fill: '#7CFC00' }).setOrigin(0.5);
        this.add.text(400, 320, 'All pieces collected and puzzle solved.', { fontSize: '20px', fill: '#ffffff' }).setOrigin(0.5);
        const again = this.add.text(400, 380, 'Press ENTER or Click to play again', { fontSize: '20px', fill: '#ffffff' }).setOrigin(0.5);

        this.input.keyboard.once('keydown_ENTER', () => {
            this.scene.start('GamePlay');
        });
        again.setInteractive({ useHandCursor: true });
        again.once('pointerdown', () => {
            this.scene.start('GamePlay');
        });
    }
}

class GameOver extends Phaser.Scene {
    constructor() {
        super('GameOver');
    }

    init(data) {
        this.piecesCollected = data ? data.piecesCollected : 0;
    }

    create() {
        this.cameras.main.setBackgroundColor(0x331111);
        this.add.text(400, 300, 'Game Over', { fontSize: '40px', fill: '#ff0000' }).setOrigin(0.5);
        this.add.text(400, 350, `Pieces collected: ${this.piecesCollected} / 8`, { fontSize: '24px', fill: '#fff' }).setOrigin(0.5);
        const again = this.add.text(400, 420, 'Press ENTER or Click to try again', { fontSize: '22px', fill: '#fff' }).setOrigin(0.5);

        this.input.keyboard.once('keydown_ENTER', () => {
            this.scene.start('GamePlay');
        });
        again.setInteractive({ useHandCursor: true });
        again.once('pointerdown', () => {
            this.scene.start('GamePlay');
        });
    }
}

var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 600 },
            debug: false
        }
    },
    scene: [MainMenu, GamePlay, PuzzleScene, Victory, GameOver]
};

var game = new Phaser.Game(config);
</script>

</body>
</html>
